---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: borealis
description: Bazzite KDE — cleaned up, passthrough ready
# verify exact name at bazzite.gg
base-image: ghcr.io/ublue-os/bazzite-kde-nvidia-open
image-version: latest

modules:

  - type: kargs
    kargs:
      - amd_iommu=on
      - iommu=pt

  - type: dnf
    repos:
      files:
        - 1password.repo
      keys:
        - https://downloads.1password.com/linux/keys/1password.asc
    remove:
      packages:
        - bazaar
        - krunner-bazaar
        - gnome-disk-utility
    install:
      packages:
        - 1password
        - chromium
        - plasma-discover
        - plasma-discover-flatpak
        - kde-partitionmanager
        - libvirt
        - libvirt-client
        - virt-manager
        - qemu-kvm
        - virt-install
        - swtpm

  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode

  - type: containerfile
    snippets:
      - "RUN ln -sf /dev/null /etc/systemd/system/bazzite-flatpak-manager.service"

  - type: files
    files:
      - source: system
        destination: /

  - type: systemd
    system:
      enabled:
        - tailscaled
        - libvirtd.service
        - asusd.service

  - type: signing