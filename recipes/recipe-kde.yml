---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: borealis
description: Bazzite KDE — cleaned up, passthrough ready
# verify exact name at bazzite.gg
base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: latest

modules:

  - type: kargs
    kargs:
      - amd_iommu=on
      - iommu=pt

  - type: dnf
    repos:
      # copr:
      #   - matinlotfali/KDE-Rounded-Corners
      files:
        - 1password.repo
        - https://download.sublimetext.com/rpm/stable/x86_64/sublime-text.repo
      keys:
        - https://downloads.1password.com/linux/keys/1password.asc
        - https://download.sublimetext.com/sublimehq-rpm-pub.gpg
    remove:
      packages:
        # - bazaar
        # - krunner-bazaar
        - gnome-disk-utility
    install:
      packages:
        - plasma-bigscreen
        - kitty
        - kjournald
        - ksystemlog
        # - kwin-effect-roundcorners
        - 1password
        - chromium
        # - plasma-discover
        # - plasma-discover-flatpak
        - kde-partitionmanager
        - libvirt
        - libvirt-client
        - virt-manager
        - qemu-kvm
        - virt-install
        - swtpm
        - sublime-text
        - sublime-merge

  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode
  
  - type: containerfile
    snippets:
      - "RUN ln -sf /dev/null /etc/systemd/system/bazzite-flatpak-manager.service"

  - type: script
    scripts:
      - create-nix-dir.sh
      # - build-kwin-rounded-corners.sh

  - type: files
    files:
      # - source: tmpfiles.d
      #   destination: /etc/tmpfiles.d
      # - source: systemd/system
      #   destination: /etc/systemd/system
      - source: system
        destination: /

  - type: systemd
    system:
      enabled:
        - tailscaled
        - libvirtd.service
        # - nix.mount
        # - asusd.service

  - type: signing