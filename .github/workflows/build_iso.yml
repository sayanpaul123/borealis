name: Build Borealis ISO

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build ISO from'
        required: false
        default: 'latest'

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/borealis
  IMAGE_TAG:  ${{ github.event.inputs.image_tag || 'latest' }}
  ISO_NAME:   borealis-os.iso

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create/update the release
      packages: read    # needed to pull from GHCR

    container:
      image: ghcr.io/blue-build/cli:latest
      options: --privileged

    steps:
      - name: Generate ISO
        run: |
          bluebuild generate-iso \
            --iso-name "${{ env.ISO_NAME }}" \
            image "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"

    #   - name: Generate checksum
    #     run: sha256sum "${{ env.ISO_NAME }}" > "${{ env.ISO_NAME }}.sha256"
     
      - name: Show build output
        run: find / -name "*.iso" 2>/dev/null

      - name: Upload iso
        uses: actions/upload-artifact@v7
        with:
          name: ${{env.ISO_NAME}}
          path : |
            ${{ github.workspace }}/build/
          retention-days: 5