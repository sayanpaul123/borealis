name: Build ISO

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build ISO from'
        required: false
        default: 'latest'

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/borealis
  IMAGE_TAG:  ${{ github.event.inputs.image_tag || 'latest' }}
  ISO_NAME:   borealis-os.iso
  OUTPUT_DIR: output

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      # Install the bluebuild binary onto the runner itself.
      # The installer image prints a script that drops the binary in /usr/local/bin.
      - name: Install BlueBuild CLI
        run: docker run --pull always --rm ghcr.io/blue-build/cli:latest-installer | sudo bash

      # Runs on the host, so build-container-installer reaches the host Docker
      # daemon directly. --output-dir pins where the ISO lands (no guessing).
      - name: Generate ISO
        run: |
          sudo bluebuild generate-iso \
            --output-dir "${{ github.workspace }}/${{ env.OUTPUT_DIR }}" \
            --iso-name "${{ env.ISO_NAME }}" \
            image "${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"

      # The ISO is written as root; make it readable/owned by the runner user.
      - name: Fix ownership
        run: sudo chown -R "$USER":"$USER" "${{ github.workspace }}/${{ env.OUTPUT_DIR }}"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: borealis-os
          path: ${{ github.workspace }}/${{ env.OUTPUT_DIR }}/
          retention-days: 5